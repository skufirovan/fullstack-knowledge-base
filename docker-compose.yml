services:
  db:
    image: postgres:16-alpine
    container_name: kb-platform_db
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kb-platform_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb-platform_backend
    env_file:
      - ./backend/.env.docker
    depends_on:
      - db
    ports:
      - "5000:5000"
    networks:
      - kb-platform_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: kb-platform_frontend
    depends_on:
      - backend
    networks:
      - kb-platform_network

  nginx:
    image: nginx:1.27-alpine
    container_name: kb-platform_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - kb-platform_network

volumes:
  postgres_data:

networks:
  kb-platform_network:
    driver: bridge